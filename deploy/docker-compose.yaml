version: '3.8'

services:
  # 1. 数据库 MySQL
  mysql:
    image: mysql:8.0
    container_name: cg-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root  # 密码暂时设为 root
      MYSQL_DATABASE: context_graph
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  # 2. 缓存 Redis
  redis:
    image: redis:latest
    container_name: cg-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 3. 消息队列 RabbitMQ (带管理界面)
  rabbitmq:
    image: rabbitmq:3-management
    container_name: cg-rabbitmq
    restart: always
    ports:
      - "5672:5672"  # 核心协议端口
      - "15672:15672" # 管理后台端口 (访问 http://localhost:15672)
    environment:
      RABBITMQ_DEFAULT_USER: superAdmin
      RABBITMQ_DEFAULT_PASS: Zlh1024@
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # 4. 对象存储 MinIO
  minio:
    image: minio/minio
    container_name: cg-minio
    restart: always
    ports:
      - "9000:9000" # API 端口
      - "9001:9001" # Web 管理后台端口
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    # 这一行很重要：启动 Server 并指定控制台地址
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # front-end:
  #   build: 
  #     context: ../front-end # 指向 front-end 目录
  #     dockerfile: Dockerfile
  #   container_name: front-end
  #   ports:
  #     - "80:80" # 浏览器访问的端口
  #   depends_on:
  #     - back-end # 确保后端先启动

  # 5. AI Service (Python FastAPI)
  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    container_name: cg-ai-service
    restart: always
    ports:
      - "8001:8001"
    depends_on:
      - minio
      - rabbitmq
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: password123
      MINIO_BUCKET: context-graph
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-xxx}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}

  back-end:
    build:
      context: ../back-end  # 指向后端代码所在的文件夹
      dockerfile: Dockerfile
    container_name: back-end
    restart: always
    ports:
      - "8080:8080"  # 宿主机端口:容器端口
    depends_on:
      - mysql        # 确保数据库先启动
      - redis        # 确保 Redis 先启动
      - rabbitmq     # 确保 RabbitMQ 先启动
      - ai-service   # 确保 AI 服务先启动
    environment:
      APP_ENV: dev
      HTTP_ADDR: :8080
      MYSQL_DSN: root:root@tcp(mysql:3306)/context_graph?charset=utf8mb4&parseTime=True&loc=Local
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      AI_SERVICE_URL: http://ai-service:8001
      MINIO_ENDPOINT: minio:9000


# 定义数据卷 (让数据持久化，重启容器数据不丢)
volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  minio_data: