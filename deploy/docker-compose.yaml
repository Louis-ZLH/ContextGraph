version: '3.8'

services:
  # 1. 数据库 MySQL
  mysql:
    image: mysql:8.0
    container_name: cg-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: context_graph
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  # 2. 缓存 Redis
  redis:
    image: redis:latest
    container_name: cg-redis
    restart: always
    expose:
      - "6379"
    volumes:
      - redis_data:/data

  # 3. 消息队列 RabbitMQ (带管理界面)
  rabbitmq:
    image: rabbitmq:3-management
    container_name: cg-rabbitmq
    restart: always
    expose:
      - "5672"
      - "15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # 4. 对象存储 MinIO
  minio:
    image: minio/minio
    container_name: cg-minio
    restart: always
    expose:
      - "9000"
      - "9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # 5. AI Service (Python FastAPI)
  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    container_name: cg-ai-service
    restart: always
    expose:
      - "8001"
    depends_on:
      - redis
      - minio
      - rabbitmq
    environment:
      # MinIO
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: context-graph
      # Redis
      REDIS_URL: redis://redis:6379/0
      # RabbitMQ
      RABBITMQ_URL: ${RABBITMQ_URL_HEARTBEAT}
      # LLM API Keys
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      CLAUDE_BASE_URL: ${CLAUDE_BASE_URL:-https://api.anthropic.com/v1}
      # Tool APIs
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      JINA_API_KEY: ${JINA_API_KEY:-}
      # AI file generation — Go backend internal API (15.2)
      GO_BACKEND_INTERNAL_URL: http://back-end-1:8080
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}

  # 6. Back-End 实例 1 (Go Gin)
  back-end-1:
    build:
      context: ../back-end
      dockerfile: dockerfile
    container_name: cg-back-end-1
    restart: always
    expose:
      - "8080"
    depends_on:
      - mysql
      - redis
      - rabbitmq
      - minio
      - ai-service
    environment:
      APP_ENV: prod
      HTTP_ADDR: :8080
      MACHINE_ID: "1"
      MYSQL_DSN: root:${MYSQL_ROOT_PASSWORD}@tcp(mysql:3306)/context_graph?charset=utf8mb4&parseTime=True&loc=Local
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      RABBITMQ_URL: ${RABBITMQ_URL}
      AI_SERVICE_URL: http://ai-service:8001
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: context-graph
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-ContextCanvas}

  # 7. Back-End 实例 2 (Go Gin)
  back-end-2:
    build:
      context: ../back-end
      dockerfile: dockerfile
    container_name: cg-back-end-2
    restart: always
    expose:
      - "8080"
    depends_on:
      - mysql
      - redis
      - rabbitmq
      - minio
      - ai-service
    environment:
      APP_ENV: prod
      HTTP_ADDR: :8080
      MACHINE_ID: "2"
      MYSQL_DSN: root:${MYSQL_ROOT_PASSWORD}@tcp(mysql:3306)/context_graph?charset=utf8mb4&parseTime=True&loc=Local
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      RABBITMQ_URL: ${RABBITMQ_URL}
      AI_SERVICE_URL: http://ai-service:8001
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: context-graph
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-ContextCanvas}

  # 8. Front-End (Nginx + React SPA + TLS)
  front-end:
    build:
      context: ../front-end
      dockerfile: dockerfile
    container_name: cg-front-end
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - back-end-1
      - back-end-2

  # 9. Certbot (Let's Encrypt 自动续签)
  certbot:
    image: certbot/certbot
    container_name: cg-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # 每 12 小时检查一次续签
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"

# 数据卷持久化
volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  certbot_www:
  certbot_certs:
