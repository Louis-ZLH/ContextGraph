version: '3.8'

services:
  mysql:
    ports:
      - "3306:3306"

  redis:
    ports:
      - "6379:6379"

  rabbitmq:
    ports:
      - "5672:5672"
      - "15672:15672"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

  ai-service:
    ports:
      - "8001:8001"

  back-end-1:
    ports:
      - "8080:8080"

  back-end-2:
    ports:
      - "8081:8080"

  # 覆盖 front-end：去掉 SSL，只用 HTTP
  front-end:
    volumes:
      - ../front-end/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"

  # dev 环境不需要 certbot
  certbot:
    profiles:
      - donotstart
