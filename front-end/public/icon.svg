<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <linearGradient id="softCanvasGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6A00" />
      <stop offset="50%" stop-color="#F04500" />
      <stop offset="100%" stop-color="#D03000" />
    </linearGradient>

    <linearGradient id="branchGradTop" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6A00" stop-opacity="0.95" />
      <stop offset="50%" stop-color="#F04500" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#D03000" stop-opacity="0.35" />
    </linearGradient>

    <linearGradient id="branchGradBottom" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6A00" stop-opacity="0.95" />
      <stop offset="50%" stop-color="#F04500" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#D03000" stop-opacity="0.35" />
    </linearGradient>

    <radialGradient id="secondaryGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FF7A1A" />
      <stop offset="50%" stop-color="#F04500" />
      <stop offset="100%" stop-color="#B82800" />
    </radialGradient>

    <radialGradient id="mainHighlight" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFA050" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#D03000" stop-opacity="0" />
    </radialGradient>

    <mask id="cutoutMask">
      <rect width="120" height="120" fill="white" />
      <circle cx="22" cy="60" r="6" fill="black" />
    </mask>
  </defs>

  <!-- 上分支 -->
  <path d="M 30 60 C 48 58, 52 12, 90 20" stroke="url(#branchGradTop)" stroke-width="10" fill="none" stroke-linecap="round" />

  <!-- 下分支 -->
  <path d="M 30 60 C 48 62, 52 108, 90 100" stroke="url(#branchGradBottom)" stroke-width="10" fill="none" stroke-linecap="round" />

  <!-- 右侧小圆 -->
  <circle cx="90" cy="20" r="14" fill="url(#secondaryGrad)" />
  <circle cx="90" cy="100" r="14" fill="url(#secondaryGrad)" />

  <!-- 主圆 + 高光 -->
  <circle cx="30" cy="60" r="22" fill="url(#softCanvasGradient)" mask="url(#cutoutMask)" />
  <circle cx="30" cy="60" r="22" fill="url(#mainHighlight)" mask="url(#cutoutMask)" />
</svg>
