upstream backend {
    server back-end-1:8080;
    server back-end-2:8080;
}

# HTTP → HTTPS 重定向 + ACME challenge
server {
    listen 80;
    server_name context-canvas.com;

    # Let's Encrypt 验证路径
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其余请求全部重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name context-canvas.com;

    ssl_certificate     /etc/letsencrypt/live/context-canvas.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/context-canvas.com/privkey.pem;

    client_max_body_size 50M;

    # 带 hash 的静态资源长期缓存
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html 不缓存，确保每次部署后浏览器加载最新版本
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # 2. 反向代理 + 负载均衡
    location /api/ {
        proxy_pass http://backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE / Streaming 支持
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # 错误页面
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
